name: QA

# Reusable workflow: called from pull-request.yml and release.yml
on:
  workflow_call:
    inputs:
      save-coverage:
        required: false
        type: boolean
        default: false
        description: "Save coverage report as artifact"

jobs:
  # ─────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # ─────────────────────────────────────────────
  # Test & Coverage
  # ─────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Coverage comment on PR
        uses: MishaKav/jest-coverage-comment@v1.0.23
        if: github.event_name == 'pull_request'
        with:
          coverage-summary-path: ./coverage/coverage-summary.json
          title: Coverage Report

      - name: Upload coverage report
        if: ${{ inputs.save-coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Secrets Scan (Gitleaks)
  # ─────────────────────────────────────────────
  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — scan for secrets
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # QA Summary (only on PR)
  # ─────────────────────────────────────────────
  qa-summary:
    name: QA Summary
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [lint, test, secrets]
    steps:
      - name: PR Comment — QA Summary
        uses: actions/github-script@v7
        with:
          script: |
            const lintStatus = '${{ needs.lint.result }}' === 'success' ? '✅' : '❌';
            const testStatus = '${{ needs.test.result }}' === 'success' ? '✅' : '❌';
            const secretsStatus = '${{ needs.secrets.result }}' === 'success' ? '✅' : '❌';

            const body = `## QA Report

            | Check | Status |
            |-------|--------|
            | 🔍 Lint | ${lintStatus} |
            | 🧪 Test & Coverage | ${testStatus} |
            | 🔐 Secrets Scan | ${secretsStatus} |

            > Generated automatically by [QA Workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## QA Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
